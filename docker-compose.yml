services:
  sys_gestion_app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      args:
        WWWUSER: ${WWWUSER:-1000}
        WWWGROUP: ${WWWGROUP:-1000}
    container_name: sys_gestion_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - sys_gestion_network
    depends_on:
      - sys_gestion_postgres
      - sys_gestion_redis

  sys_gestion_nginx:
    image: nginx:alpine
    container_name: sys_gestion_nginx
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - sys_gestion_app
    networks:
      - sys_gestion_network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sys_gestion.rule=Host(`sys-gestion.localhost`)"
      - "traefik.http.routers.sys_gestion.entrypoints=web"
      - "traefik.docker.network=traefik"

  sys_gestion_maildev:
    image: maildev/maildev
    container_name: sys_gestion_maildev
    restart: unless-stopped
    networks:
      - sys_gestion_network
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sys_gestion_maildev.rule=Host(`mail.sys-gestion.localhost`)"
      - "traefik.http.routers.sys_gestion_maildev.entrypoints=web"
      - "traefik.http.services.sys_gestion_maildev.loadbalancer.server.port=1080"
      - "traefik.docker.network=traefik"

  sys_gestion_postgres:
    image: postgres:16-alpine
    container_name: sys_gestion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - sys_gestion_postgres_data:/var/lib/postgresql/data
    networks:
      - sys_gestion_network

  sys_gestion_redis:
    image: redis:alpine
    container_name: sys_gestion_redis
    restart: unless-stopped
    ports:
      - "6377:6379"
    networks:
      - sys_gestion_network

networks:
  sys_gestion_network:
    driver: bridge
  traefik:
    external: true

volumes:
  sys_gestion_postgres_data:
    driver: local
